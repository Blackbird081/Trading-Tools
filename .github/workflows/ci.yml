name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  python-lint:
    name: Python Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run ruff
        run: uv run ruff check . && uv run ruff format --check .
      - name: Run mypy
        run: uv run mypy packages/

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run unit tests with coverage
        run: |
          uv run pytest tests/unit/ \
            --cov=packages \
            --cov-report=xml:coverage/python/coverage.xml \
            --cov-report=json:coverage/python/coverage.json \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v
      - name: Upload python coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: coverage/python/
          retention-days: 14

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        run: pnpm lint
      - name: Run TypeScript check
        run: pnpm tsc --noEmit

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Vitest with coverage reports
        run: |
          pnpm test --run --coverage \
            --coverage.reporter=text-summary \
            --coverage.reporter=json-summary \
            --coverage.reporter=lcov \
            --coverage.reportsDirectory=coverage
      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  coverage-summary:
    name: Coverage Summary & Badge Artifact
    runs-on: ubuntu-latest
    needs: [python-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Download python coverage
        uses: actions/download-artifact@v4
        with:
          name: python-coverage
          path: coverage/python
      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: Generate coverage markdown + badges
        run: |
          python scripts/generate_coverage_report.py \
            --python-json coverage/python/coverage.json \
            --frontend-json frontend/coverage/coverage-summary.json \
            --output docs/reports/TEST_COVERAGE_LATEST.md \
            --badge-output docs/reports/TEST_COVERAGE_BADGES.md \
            --source ci \
            --python-status pass \
            --frontend-status pass
      - name: Upload coverage summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: |
            docs/reports/TEST_COVERAGE_LATEST.md
            docs/reports/TEST_COVERAGE_BADGES.md
          retention-days: 14
      - name: Publish coverage summary to workflow run
        run: cat docs/reports/TEST_COVERAGE_LATEST.md >> $GITHUB_STEP_SUMMARY
