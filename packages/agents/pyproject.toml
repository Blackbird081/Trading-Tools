[project]
name = "agents"
version = "0.1.0"
description = "Agent layer — LangGraph orchestration, data/screener/technical/risk agents."
requires-python = ">=3.12"
dependencies = [
    "core",
    "adapters",
    "langgraph>=0.2",
]

[project.optional-dependencies]
technical = [
    "pandas>=2.2",
    "pandas_ta>=0.3.14b0",
]

[tool.uv.sources]
core = { workspace = true }
adapters = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
